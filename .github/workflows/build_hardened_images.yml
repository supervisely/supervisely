name: Build and Scan Hardened Images

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: "Docker image tag (without 'v')"
        required: true
        default: ""

jobs:
  build_scan:
    runs-on: gha-runner-supervisely
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: py-sdk-hardened
            image_dir: base_images/py_sdk_hardened
            dockerfile: base_images/py_sdk_hardened/Dockerfile
          - image_name: import-export-hardened
            image_dir: docker_images/import_export_hardened
            dockerfile: docker_images/import_export_hardened/Dockerfile
          - image_name: labeling-hardened
            image_dir: docker_images/labeling_hardened
            dockerfile: docker_images/labeling_hardened/Dockerfile
          - image_name: system-hardened
            image_dir: docker_images/system_hardened
            dockerfile: docker_images/system_hardened/Dockerfile
          - image_name: data-operations-hardened
            image_dir: docker_images/data_operations_hardened
            dockerfile: docker_images/data_operations_hardened/Dockerfile

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build image
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context="${{ github.workspace }}" \
            --local dockerfile="${{ github.workspace }}" \
            --opt filename="${{ matrix.dockerfile }}" \
            --opt build-arg:tag_ref_name="${{ github.event.inputs.tag_version }}" \
            --output type=docker,name=supervisely/${{ matrix.image_name }}:${{ github.event.inputs.tag_version }},dest=/tmp/${{ matrix.image_name }}.tar

          docker load -i /tmp/${{ matrix.image_name }}.tar

      - name: pip-audit scan
        run: |
          mkdir -p audit_logs
          if ! docker run --rm -v "$PWD/audit_logs:/work" \
            "supervisely/${{ matrix.image_name }}:${{ github.event.inputs.tag_version }}" \
            sh -lc "/opt/venv/bin/python -m pip_audit --format json > /work/pip_audit.json"; then
            echo "pip-audit found vulnerabilities" >&2
            exit 1
          fi

      - name: Trivy scan (HIGH/CRITICAL)
        run: |
          mkdir -p trivy_logs
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/trivy_logs:/work" \
            aquasec/trivy:latest image --severity HIGH,CRITICAL --exit-code 1 \
            --format json --output /work/${{ matrix.image_name }}.json \
            "supervisely/${{ matrix.image_name }}:${{ github.event.inputs.tag_version }}"

      - name: Dockle scan (FATAL)
        run: |
          mkdir -p dockle_logs
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/dockle_logs:/work" \
            goodwithtech/dockle:latest --exit-code 1 --exit-level FATAL \
            --accept-file '.*settings\.py$' \
            --format json --output /work/${{ matrix.image_name }}.json \
            "supervisely/${{ matrix.image_name }}:${{ github.event.inputs.tag_version }}"

      - name: Generate SBOM (SPDX JSON)
        run: |
          mkdir -p sbom_logs
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/sbom_logs:/work" \
            anchore/syft:latest \
            "supervisely/${{ matrix.image_name }}:${{ github.event.inputs.tag_version }}" \
            -o spdx-json=/work/${{ matrix.image_name }}-sbom.json

      - name: Push image
        run: |
          docker push "supervisely/${{ matrix.image_name }}:${{ github.event.inputs.tag_version }}"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-${{ matrix.image_name }}
          path: trivy_logs/${{ matrix.image_name }}.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-${{ matrix.image_name }}
          path: audit_logs/pip_audit.json

      - name: Upload Dockle report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dockle-${{ matrix.image_name }}
          path: dockle_logs/${{ matrix.image_name }}.json

      - name: Upload SBOM report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ matrix.image_name }}
          path: sbom_logs/${{ matrix.image_name }}-sbom.json
