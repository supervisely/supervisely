# https://hub.docker.com/r/supervisely/base-py-sdk-hardened
name: Build base-py-sdk-hardened Docker

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: "Docker Image Tag (without 'v')"
        required: true
        type: string
        default: ""
  workflow_call:
    inputs:
      tag_version:
        description: "Docker Image Tag (without 'v')"
        required: true
        type: string

jobs:
  deploy:
    runs-on: gha-runner-supervisely
    env:
      IMAGE_NAME: base-py-sdk-hardened

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Write Tag to ENV variable
        run: |
          TAG_VERSION="${{ inputs.tag_version }}"
          echo "TAG_VERSION=${TAG_VERSION#v}" >> "$GITHUB_ENV"

      - name: Build image archive for checks
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=${{ github.workspace }} \
            --local dockerfile=${{ github.workspace }}/base_images/py_sdk_hardened \
            --opt build-arg:tag_ref_name=${{ env.TAG_VERSION }} \
            --output type=docker,name=docker.io/supervisely/${{ env.IMAGE_NAME }}:${{ env.TAG_VERSION }},dest=image.tar \
            --export-cache type=registry,ref=docker.io/supervisely/${{ env.IMAGE_NAME }}:buildcache,mode=max \
            --import-cache type=registry,ref=docker.io/supervisely/${{ env.IMAGE_NAME }}:buildcache

      - name: Install SDK for dependency audit
        run: |
          python3 -m venv audit-venv
          . audit-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: audit-venv

      # TODO: Add a non-blocking full image vulnerability scan with anchore/scan-action
      # after defining an OS package CVE policy for hardened base images.

      - name: Dockle scan on archive
        run: |
          mkdir -p dockle_logs
          dockle --exit-code 1 --exit-level FATAL --input image.tar -af settings.py --format json --output dockle_logs/${IMAGE_NAME}.json

      - name: Generate SBOM (SPDX JSON)
        run: |
          mkdir -p sbom_logs
          syft -q "docker-archive:image.tar" -o "spdx-json=sbom_logs/${IMAGE_NAME}-sbom.json"

      - name: Push scanned image archive
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            skopeo copy \
              --dest-creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
              docker-archive:image.tar \
              docker://docker.io/supervisely/${{ env.IMAGE_NAME }}:$TAG_VERSION
          else
            skopeo copy \
              docker-archive:image.tar \
              docker://docker.io/supervisely/${{ env.IMAGE_NAME }}:$TAG_VERSION
          fi

      - name: Upload Dockle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dockle-${{ env.IMAGE_NAME }}
          path: dockle_logs/${{ env.IMAGE_NAME }}.json
          if-no-files-found: ignore

      - name: Upload SBOM report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.IMAGE_NAME }}
          path: sbom_logs/${{ env.IMAGE_NAME }}-sbom.json
          if-no-files-found: ignore
